version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: proposal-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: commercial_proposal
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: proposal-backend
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/commercial_proposal?schema=public"
      JWT_SECRET: "${JWT_SECRET}"
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
      DEEPSEEK_API_KEY: "${DEEPSEEK_API_KEY}"
      GEMINI_API_KEY: "${GEMINI_API_KEY}"
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN}"
      FRONTEND_URL: "${FRONTEND_URL}"
      NODE_ENV: "production"
    ports:
      - "4000:4000"
    volumes:
      - uploads_data:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: proposal-frontend
    restart: always
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: "http://backend:4000/api"
      NEXT_PUBLIC_BOT_USERNAME: "${NEXT_PUBLIC_BOT_USERNAME}"
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  uploads_data:
